name: 'Ledgerful Risk Report'
description: 'Post Ledgerful change-intelligence risk analysis as a pull-request comment'
author: 'Ledgerful'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  github-token:
    description: 'GitHub token for posting/updating comments (GITHUB_TOKEN is sufficient)'
    required: true
  project-path:
    description: 'Workspace-relative path to the repository root'
    required: false
    default: '.'
  base-ref:
    description: 'Git ref to compare against. Defaults to PR base commit SHA.'
    required: false
    default: ''
  risk-threshold:
    description: 'Minimum overall risk level that triggers a comment: TRIVIAL|LOW|MEDIUM|HIGH'
    required: false
    default: 'TRIVIAL'
  fail-on-risk:
    description: 'Fail the action if overall risk meets or exceeds this level: LOW|MEDIUM|HIGH'
    required: false
    default: ''
  ledgerful-version:
    description: 'Git tag of Ledgerful/Ledgerful to install (default: the action checkout)'
    required: false
    default: ''
  post-on-clean:
    description: 'Post a comment when scan returns no files (clean tree)'
    required: false
    default: 'false'

outputs:
  overall-risk:
    description: 'Overall risk level: HIGH | MEDIUM | LOW | TRIVIAL'
  changed-files-count:
    description: 'Number of changed files detected'
  comment-url:
    description: 'URL of the created or updated PR comment'

runs:
  using: 'node20'
  main: 'dist/index.cjs'
