name: Release

on:
  push:
    tags:
      - "v*"
  # Allow re-running a release for an existing tag without retagging (ops recovery).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.9). Must already exist on the repo."
        required: true
        type: string

permissions:
  contents: write

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      # Public frontend repo — no PAT required for checkout.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ryan-AI-Studios/ledgerful-frontend
          ref: 4a1df7e2be68bb1136a18c52f1ba420801858c89
          path: ledgerful-frontend
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci
        working-directory: ledgerful-frontend
      - run: npm run build
        working-directory: ledgerful-frontend
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ledgerful-web-spa
          path: ledgerful-frontend/out

  build:
    name: Build ${{ matrix.asset }}
    needs: web-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ledgerful-x86_64-unknown-linux-gnu
            archive: tar
            binary: ledgerful
            target: ""
          - os: windows-latest
            asset: ledgerful-x86_64-pc-windows-msvc
            archive: zip
            binary: ledgerful.exe
            target: ""
          - os: macos-15
            asset: ledgerful-x86_64-apple-darwin
            archive: tar
            binary: ledgerful
            target: x86_64-apple-darwin
          - os: macos-14
            asset: ledgerful-aarch64-apple-darwin
            archive: tar
            binary: ledgerful
            target: ""

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-auditable + cargo-audit
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-auditable --locked
          cargo install cargo-audit --locked
      - shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo auditable build --release --locked --all-features --target ${{ matrix.target }}
          else
            cargo auditable build --release --locked --all-features
          fi
      - name: Verify embedded dependency list
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.target }}" ]; then
            bin="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          else
            bin="target/release/${{ matrix.binary }}"
          fi
          cargo audit bin "$bin"
      - name: Package Unix
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.asset }}
          if [ -n "${{ matrix.target }}" ]; then
            cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.asset }}/
          else
            cp target/release/${{ matrix.binary }} dist/${{ matrix.asset }}/
          fi
          cp -r ../ledgerful-frontend/out dist/${{ matrix.asset }}/web
          cp README.md LICENSE dist/${{ matrix.asset }}/
          tar -czf dist/${{ matrix.asset }}.tar.gz -C dist ${{ matrix.asset }}
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum dist/${{ matrix.asset }}.tar.gz > dist/${{ matrix.asset }}.tar.gz.sha256
          else
            shasum -a 256 dist/${{ matrix.asset }}.tar.gz > dist/${{ matrix.asset }}.tar.gz.sha256
          fi
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/${{ matrix.asset }}" | Out-Null
          Copy-Item "target/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}/"
          Copy-Item "../ledgerful-frontend/out" "dist/${{ matrix.asset }}/web" -Recurse -Force
          Copy-Item README.md,LICENSE "dist/${{ matrix.asset }}/"
          Compress-Archive -Path "dist/${{ matrix.asset }}/*" -DestinationPath "dist/${{ matrix.asset }}.zip" -Force
          $archiveName = "${{ matrix.asset }}.zip"
          $archivePath = "dist/$archiveName"
          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archiveName" | Set-Content -Path "$archivePath.sha256" -Encoding ascii
      - name: Attest build provenance
        # Gated on public repo/Enterprise Cloud. actions/attest needs a public repo or GitHub Enterprise Cloud;
        # this step is skipped while ledgerful remains private and will activate automatically when the repository becomes public.
        # Uses actions/attest in default SLSA build-provenance mode (no custom predicate-type/predicate needed).
        if: github.event.repository.visibility == 'public' || github.event.repository.visibility == 'internal'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: dist/${{ matrix.asset }}.${{ matrix.archive == 'tar' && 'tar.gz' || 'zip' }}
      - name: Attest build provenance (private repo fallback)
        if: github.event.repository.visibility != 'public' && github.event.repository.visibility != 'internal'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping GitHub artifact attestation: repository is not public and this is not GitHub Enterprise Cloud."
          echo "Attestation will be enabled automatically once the repo is public (when the repository becomes public)."
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  mcp-package:
    name: Pack MCP npm package
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo build --bin ledgerful --locked --no-default-features --features mcp,export
      - run: npm ci
        working-directory: mcp-server
      - run: npm test
        working-directory: mcp-server
        env:
          LEDGERFUL_MCP_BIN_OVERRIDE: ${{ github.workspace }}/target/debug/ledgerful
      - run: mkdir -p dist
        working-directory: mcp-server
      - run: npm pack --pack-destination dist
        working-directory: mcp-server
        env:
          LEDGERFUL_MCP_SKIP_DOWNLOAD: "1"
      - name: Smoke packed MCP package
        working-directory: mcp-server
        shell: bash
        env:
          LEDGERFUL_MCP_BIN_OVERRIDE: ${{ github.workspace }}/target/debug/ledgerful
        run: |
          set -euo pipefail
          scratch="$(mktemp -d)"
          package="$(find "$PWD/dist" -name '*.tgz' -print -quit)"
          pushd "$scratch"
          npm init -y
          npm install "$package"
          popd
          LEDGERFUL_MCP_COMMAND="$scratch/node_modules/.bin/ledgerful-mcp" node test/smoke-local.js
      - name: Attest MCP package provenance
        # Gated on public repo/Enterprise Cloud. actions/attest needs a public repo or GitHub Enterprise Cloud;
        # this step is skipped while ledgerful remains private and will activate automatically when the repository becomes public.
        if: github.event.repository.visibility == 'public' || github.event.repository.visibility == 'internal'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: mcp-server/dist/*.tgz
      - name: Attest MCP package provenance (private repo fallback)
        if: github.event.repository.visibility != 'public' && github.event.repository.visibility != 'internal'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping GitHub artifact attestation: repository is not public and this is not GitHub Enterprise Cloud."
          echo "Attestation will be enabled automatically once the repo is public (when the repository becomes public)."
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ledgerful-mcp-server-npm
          path: mcp-server/dist/*.tgz

  # 0053-SupplyChainAttestation Phase 1: per-release CycloneDX SBOM for the engine
  # (all features) + the MCP npm package. Lockfile-derived and target-independent,
  # so generated once here rather than per build-matrix entry.
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Install jsonschema (for SBOM validation)
        run: pip install jsonschema
      - name: Engine SBOM (all features â€” must match the --all-features release build)
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          cargo cyclonedx --all-features --format json
          # cargo-cyclonedx writes <package>.cdx.json next to Cargo.toml; capture it
          # by glob so we don't depend on the exact base-name across tool versions.
          sbom_file="$(find . -maxdepth 2 -name '*.cdx.json' -not -path './dist/*' -print -quit)"
          cp "$sbom_file" "dist/ledgerful-${version}.cdx.json"
      - name: MCP package SBOM
        working-directory: mcp-server
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          npm ci
          npm sbom --sbom-format cyclonedx > "../dist/ledgerful-mcp-server-${version}.cdx.json"
      - name: Validate SBOM (CycloneDX schema)
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # Download the CycloneDX JSON schema and validate both SBOMs against it.
          schema_url="https://raw.githubusercontent.com/CycloneDX/specification/refs/tags/1.5/schema/bom-1.5.schema.json"
          curl -fsSL "$schema_url" -o /tmp/cdx-schema.json
          for f in "dist/ledgerful-${version}.cdx.json" "dist/ledgerful-mcp-server-${version}.cdx.json"; do
            echo "Validating $f against CycloneDX 1.5 schema"
            python3 -c "
          import json, sys, jsonschema
          with open('/tmp/cdx-schema.json') as fh:
              schema = json.load(fh)
          with open(sys.argv[1]) as fh:
              doc = json.load(fh)
          jsonschema.validate(doc, schema)
          print(f'{sys.argv[1]}: valid CycloneDX 1.5')
          " "$f"
          done
      - name: Compute version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Attest SBOM (private repo fallback)
        if: github.event.repository.visibility != 'public' && github.event.repository.visibility != 'internal'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping GitHub SBOM attestation: repository is not public and this is not GitHub Enterprise Cloud."
          echo "Attestation will be enabled automatically once the repo is public (when the repository becomes public)."
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: dist/*.cdx.json

  sign:
    name: Sign release artifacts (cosign keyless)
    needs:
      - build
      - mcp-package
      - sbom
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Compute version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Attest engine SBOM
        # Gated on public repo/Enterprise Cloud. actions/attest-sbom needs a public repo or GitHub Enterprise Cloud;
        # this step is skipped while ledgerful remains private and will activate automatically when the repository becomes public.
        # The SBOM is lockfile-derived and target-independent, so it is bound to all release archives.
        # Note: GitHub Actions context does not expose enterprise status; a private Enterprise Cloud
        # repo will skip this step until the repo visibility is changed.
        if: github.event.repository.visibility == 'public' || github.event.repository.visibility == 'internal'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/*.tar.gz,dist/*.zip
          sbom-path: dist/ledgerful-${{ steps.version.outputs.value }}.cdx.json
      - name: Attest MCP SBOM
        if: github.event.repository.visibility == 'public' || github.event.repository.visibility == 'internal'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/*.tgz
          sbom-path: dist/ledgerful-mcp-server-${{ steps.version.outputs.value }}.cdx.json
      - name: Attest SBOM (private repo fallback)
        if: github.event.repository.visibility != 'public' && github.event.repository.visibility != 'internal'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping GitHub SBOM attestation: repository is not public and this is not GitHub Enterprise Cloud."
          echo "Attestation will be enabled automatically once the repo is public (when the repository becomes public)."
      - name: Install cosign
        uses: sigstore/cosign-installer@3094a48ba06382e0e6cfa5a4af4fcc55fc6942b9
        with:
          cosign-release: v3.1.1
      - name: Sign archives + SBOM
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          for artifact in dist/*.tar.gz dist/*.zip dist/*.tgz "dist/ledgerful-${version}.cdx.json" "dist/ledgerful-mcp-server-${version}.cdx.json"; do
            [ -f "$artifact" ] || continue
            cosign sign-blob \
              --yes \
              --output-signature="${artifact}.sig" \
              --output-certificate="${artifact}.pem" \
              --bundle="${artifact}.bundle" \
              "$artifact"
          done
      - name: Verify signatures (CI self-check)
        shell: bash
        env:
          GITHUB_WORKFLOW_IDENTITY: "https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/${{ github.ref_name }}"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          for artifact in dist/*.tar.gz dist/*.zip dist/*.tgz "dist/ledgerful-${version}.cdx.json" "dist/ledgerful-mcp-server-${version}.cdx.json"; do
            [ -f "$artifact" ] || continue
            cosign verify-blob \
              --bundle "${artifact}.bundle" \
              --certificate-identity "$GITHUB_WORKFLOW_IDENTITY" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "$artifact"
          done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: |
            dist/*.sig
            dist/*.pem
            dist/*.bundle

  publish:
    name: Publish GitHub Release
    needs:
      - build
      - mcp-package
      - sbom
      - sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Verify GitHub attestations (public repo only)
        # Gated on public repo/Enterprise Cloud. gh attestation verify needs the artifact to have been attested by
        # GitHub; skipped while ledgerful remains private and will activate automatically when the repository becomes public.
        if: github.event.repository.visibility == 'public' || github.event.repository.visibility == 'internal'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          owner="${{ github.repository_owner }}"
          # Binary provenance + SBOM attestation for each release archive + MCP package.
          # gh attestation verify checks all attestation types by default (provenance + SBOM).
          for bin in dist/*.tar.gz dist/*.zip dist/*.tgz; do
            [ -f "$bin" ] || continue
            gh attestation verify "$bin" --owner "$owner"
          done
      - name: Verify GitHub attestations (private repo fallback)
        if: github.event.repository.visibility != 'public' && github.event.repository.visibility != 'internal'
        shell: bash
        run: |
          set -euo pipefail
          echo "Skipping GitHub attestation verification: repository is not public and this is not GitHub Enterprise Cloud."
          echo "Verification will run automatically once the repo is public (when the repository becomes public)."
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.tgz
            dist/*.sha256
            dist/*.cdx.json
            dist/*.sig
            dist/*.pem
            dist/*.bundle

  # 0051-PackageManagerDistribution: bump brew/scoop manifests from published .sha256
  # files. Always validates the bump script (dry-run + write to workspace). Pushing
  # to Ryan-AI-Studios/homebrew-tap and Ryan-AI-Studios/scoop-bucket is gated on
  # MANIFEST_PUSH_TOKEN (fine-grained PAT with contents:write on those repos).
  bump-manifests:
    name: Bump package manifests
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compute version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download published checksums
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p checksums
          # Prefer the just-published tag's .sha256 assets (authoritative).
          gh release download "${GITHUB_REF_NAME}" \
            --repo "${{ github.repository }}" \
            --pattern "*.sha256" \
            --dir checksums \
            --clobber
          ls -la checksums
      - name: Validate bump (always — DoD-4 fixture path in CI)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/bump-manifests.sh
          # Dry-run proves parse + fail-closed against live checksums
          scripts/bump-manifests.sh \
            --version "${{ steps.version.outputs.value }}" \
            --checksums-dir checksums \
            --packaging-dir packaging \
            --dry-run
          # Materialize outputs for optional push
          scripts/bump-manifests.sh \
            --version "${{ steps.version.outputs.value }}" \
            --checksums-dir checksums \
            --packaging-dir packaging \
            --out-dir bumped
          echo "---- homebrew/ledgerful.rb (head) ----"
          head -n 40 bumped/homebrew/ledgerful.rb
          echo "---- scoop/ledgerful.json ----"
          cat bumped/scoop/ledgerful.json
      # NOTE: secrets context is NOT allowed in `if:` expressions (causes
      # "Unrecognized named-value: 'secrets'" and 0-job workflow failures).
      # Gate push vs skip inside the shell with env presence.
      - name: Push to homebrew-tap + scoop-bucket (or skip)
        shell: bash
        env:
          MANIFEST_PUSH_TOKEN: ${{ secrets.MANIFEST_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${MANIFEST_PUSH_TOKEN}" ]; then
            echo "skip push (no MANIFEST_PUSH_TOKEN secret) — bump validation above still ran"
            exit 0
          fi
          version="${{ steps.version.outputs.value }}"
          push_one() {
            local repo="$1"
            local src="$2"
            local dest_path="$3"
            local scratch
            scratch="$(mktemp -d)"
            git clone --depth 1 "https://x-access-token:${MANIFEST_PUSH_TOKEN}@github.com/${repo}.git" "$scratch"
            mkdir -p "$(dirname "$scratch/$dest_path")"
            cp "$src" "$scratch/$dest_path"
            git -C "$scratch" config user.name "ledgerful-release[bot]"
            git -C "$scratch" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C "$scratch" add "$dest_path"
            if git -C "$scratch" diff --cached --quiet; then
              echo "${repo}: no changes for v${version}"
            else
              git -C "$scratch" commit -m "chore: bump ledgerful to v${version}"
              git -C "$scratch" push origin HEAD
              echo "${repo}: pushed v${version}"
            fi
          }
          # Tap dest is root-only ledgerful.rb (not Formula/ledgerful.rb).
          push_one "Ryan-AI-Studios/homebrew-tap" "bumped/homebrew/ledgerful.rb" "ledgerful.rb"
          push_one "Ryan-AI-Studios/scoop-bucket" "bumped/scoop/ledgerful.json" "ledgerful.json"

  # 0051 winget: subsequent version bumps via SHA-pinned winget-releaser.
  # First-time package submission must exist in microsoft/winget-pkgs first
  # (manual wingetcreate / PR); this action requires ≥1 version already present.
  # NOTE: do not use `if: secrets.*` at job level — that has caused 0-job workflow
  # failures on tag pushes. Gate inside the step with an env-presence check instead.
  winget-release:
    name: Submit winget package update
    needs: publish
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Detect WINGET_TOKEN
        id: winget_token
        shell: bash
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -n "${WINGET_TOKEN}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "skip winget-release (no WINGET_TOKEN secret) — leave unset until Ledgerful.Ledgerful exists on winget-pkgs"
          fi
      - name: WinGet Releaser
        if: steps.winget_token.outputs.present == 'true'
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: Ledgerful.Ledgerful
          # Portable Windows zip from release.yml (not msi/exe installer)
          installers-regex: 'ledgerful-x86_64-pc-windows-msvc\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
