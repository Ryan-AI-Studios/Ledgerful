name: Install Smoke Test

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Ryan-AI-Studios/ledgerful-frontend
          token: ${{ secrets.LEDGERFUL_FRONTEND_PAT }}
          path: ledgerful-frontend
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: ledgerful-frontend
      - run: npm run build
        working-directory: ledgerful-frontend
      - uses: actions/upload-artifact@v4
        with:
          name: ledgerful-web-spa
          path: ledgerful-frontend/out

  install-smoke:
    needs: web-build
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install --path . --features mcp,web --locked --force
      - run: ledgerful --version
      - name: Run MCP Smoke Test (Bash)
        if: runner.os != 'Windows'
        run: ./scripts/smoke_mcp.sh
      - name: Run MCP Smoke Test (PowerShell)
        if: runner.os == 'Windows'
        run: ./scripts/smoke_mcp.ps1
