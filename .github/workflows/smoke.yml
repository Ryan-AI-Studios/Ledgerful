name: Install Smoke Test

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

permissions:
  contents: read

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ryan-AI-Studios/ledgerful-frontend
          ref: 4a1df7e2be68bb1136a18c52f1ba420801858c89
          token: ${{ secrets.LEDGERFUL_FRONTEND_PAT }}
          path: ledgerful-frontend
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci
        working-directory: ledgerful-frontend
      - run: npm run build
        working-directory: ledgerful-frontend
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ledgerful-web-spa
          path: ledgerful-frontend/out

  install-smoke:
    needs: web-build
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HTTP_MULTIPLEXING: false
      CARGO_NET_RETRY: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: cargo install --path . --features mcp,web --locked --force
      - run: ledgerful --version
      - name: Run MCP Smoke Test (Bash)
        if: runner.os != 'Windows'
        run: ./scripts/smoke_mcp.sh
      - name: Run MCP Smoke Test (PowerShell)
        if: runner.os == 'Windows'
        run: ./scripts/smoke_mcp.ps1
