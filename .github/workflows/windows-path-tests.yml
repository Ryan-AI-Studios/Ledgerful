name: Windows path tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/windows-path-tests.yml
      - src/cli/dispatch.rs
      - src/util/path.rs
      - tests/integration/path_security.rs

permissions:
  contents: read

jobs:
  path-tests:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-nextest
        # Pin mainline v2 release SHA (not per-tool tags). Dependabot cannot
        # resolve diverged convenience commits (error: no such commit).
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest
      - name: Run path regression tests
        run: >-
          cargo nextest run -j 1 --workspace --all-features --profile ci
          validate_export_path_accepts_valid_relative_file
          validate_export_path_refuses_absolute_path_in_src
          normalize_relative_path__dotdot_sequences__never_escapes_root
