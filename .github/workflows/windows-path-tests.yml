name: Windows path tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/windows-path-tests.yml
      - src/cli/dispatch.rs
      - src/util/path.rs
      - tests/integration/path_security.rs

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  path-tests:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-nextest
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2
      - name: Run path regression tests
        run: >-
          cargo nextest run -j 1 --workspace --all-features --profile ci
          validate_export_path_accepts_valid_relative_file
          validate_export_path_refuses_absolute_path_in_src
          normalize_relative_path__dotdot_sequences__never_escapes_root
