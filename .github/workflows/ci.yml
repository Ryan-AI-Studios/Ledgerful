name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: Ryan-AI-Studios/ledgerful-frontend
          token: ${{ secrets.LEDGERFUL_FRONTEND_PAT }}
          path: ledgerful-frontend
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - run: npm ci
        working-directory: ledgerful-frontend
      - run: npm run build
        working-directory: ledgerful-frontend
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ledgerful-web-spa
          path: ledgerful-frontend/out

  fmt:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo fmt --check

  clippy:
    needs: web-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    needs: web-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-nextest
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2

      - name: Run fast tier (default + integration)
        shell: bash
        # Uses `.config/nextest.toml` profile `ci` (excludes `__slow` tests
        # and the `compile_fail` trybuild crate). `-j 1` is kept on Windows
        # to avoid NTFS/link.exe contention flakiness. TA3 replaced the
        # process-wide cwd_lock with per-test DirGuard + `#[serial]`.
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo nextest run -j 1 --workspace --all-features --profile ci
          else
            cargo nextest run --workspace --all-features --profile ci
          fi

      - name: Run doctests
        shell: bash
        run: cargo test --workspace --all-features --doc

  test-slow:
    needs: [web-build, test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-nextest
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2

      - name: Run slow tier
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo nextest run -j 1 --workspace --all-features --profile slow
          else
            cargo nextest run --workspace --all-features --profile slow
          fi

  test-compile-fail:
    needs: [web-build, test]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-nextest
        uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2

      - name: Run compile-fail tier (trybuild)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo nextest run -j 1 --workspace --all-features --profile compile-fail
          else
            cargo nextest run --workspace --all-features --profile compile-fail
          fi

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo install cargo-deny --locked
      - run: cargo deny check advisories

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@e2ba4a39dc7bf116c8a572366d98fadc69b818f5
      - uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2
      - run: cargo llvm-cov nextest --workspace --all-features --html --output-dir coverage/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: coverage/

  mutation:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: taiki-e/install-action@18124c74391878d932c447fcd1687a5fa1058c01
      - uses: taiki-e/install-action@83a8c001de7da72527da9df53f6ef9d3a1f5b3e2
      - run: cargo mutants --workspace --in-place --file 'src/ledger/**' --file 'src/impact/**' --file 'src/verify/**'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: mutants-report
          path: mutants.out/
