name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  schedule:
    - cron: '0 4 * * *'

permissions:
  contents: read

jobs:
  web-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Public frontend repo — no PAT. Dependabot PR workflows cannot read
      # repository secrets (only Dependabot secrets), so a required token
      # fails as empty ("Input required and not supplied: token") and blocks
      # the whole CI graph (clippy/test need web-build).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Ryan-AI-Studios/ledgerful-frontend
          ref: 4a1df7e2be68bb1136a18c52f1ba420801858c89
          path: ledgerful-frontend
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm ci
        working-directory: ledgerful-frontend
      - run: npm run build
        working-directory: ledgerful-frontend
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ledgerful-web-spa
          path: ledgerful-frontend/out

  fmt:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: cargo fmt --check

  clippy:
    needs: web-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    needs: web-build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-nextest
        # Pin mainline v2 release SHA (not per-tool tags). Dependabot shallow-
        # clones cannot resolve diverged nextest/cargo-llvm-cov/cargo-mutants
        # convenience commits (error: no such commit).
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest

      - name: Run fast tier (default + integration)
        shell: bash
        # Uses `.config/nextest.toml` profile `ci` (excludes `__slow` tests).
        # `-j 4` on Windows: bounded parallelism (4 vCPU / 16 GB runner).
        # Phase-0 of track 0062 found the old `-j 1` was guarding test-runtime
        # OOM, not compile (no build-jobs cap exists). Full-parallel local run:
        # 2134 passed, 0 flakes. `#[serial(cwd/env)]` are no-ops under
        # nextest's process-per-test model (serial_test 3.5.0, no file_locks).
        # If CI OOMs at -j 4, drop to -j 2.
        # See `.config/nextest.toml` [test-groups.serial] for confirmed contenders.
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo nextest run -j 4 --workspace --all-features --profile ci
          else
            cargo nextest run --workspace --all-features --profile ci
          fi

      - name: Run doctests
        shell: bash
        run: cargo test --workspace --all-features --doc

  test-slow:
    needs: [web-build, clippy]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-web-spa
          path: ../ledgerful-frontend/out
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-nextest
        uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: nextest

      - name: Run slow tier
        shell: bash
        # `-j 4` on Windows: bounded parallelism for the 4 vCPU / 16 GB runner.
        # See the `test` job and `.config/nextest.toml` [test-groups.serial].
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cargo nextest run -j 4 --workspace --all-features --profile slow
          else
            cargo nextest run --workspace --all-features --profile slow
          fi

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: cargo install cargo-deny --locked
      - run: cargo deny check advisories

  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  no-network-public-export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: No-network grep (public export)
        shell: bash
        run: |
          result=$(grep -RE "ureq|reqwest|tokio_tungstenite" src/ledger/public_export.rs || true)
          if [ -n "$result" ]; then
            echo "FAIL: network dependencies found in public export module"
            echo "$result"
            exit 1
          fi
          echo "PASS: no network dependencies in public export module" > no-network-result.txt
      - name: No-network grep (self-timing)
        shell: bash
        run: |
          result=$(grep -RE "ureq|reqwest|tokio_tungstenite" \
            src/commands/timings.rs \
            src/state/storage/timings.rs \
            src/observability/self_timing.rs || true)
          if [ -n "$result" ]; then
            echo "FAIL: network dependencies found in self-timing path (0043)"
            echo "$result"
            exit 1
          fi
          echo "PASS: no network dependencies in self-timing modules" >> no-network-result.txt
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: no-network-grep
          path: no-network-result.txt
          retention-days: 90

  coverage:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov,nextest
      - run: cargo llvm-cov nextest --workspace --all-features --html --output-dir coverage/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/

  mutation:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-mutants,nextest
      - run: cargo mutants --workspace --in-place --file 'src/ledger/**' --file 'src/impact/**' --file 'src/verify/**'
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: mutants.out/
