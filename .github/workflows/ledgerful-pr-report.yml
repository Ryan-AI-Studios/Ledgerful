# Workflow B — Ledgerful PR Report (engine dogfood)
# Track 0068 / 0047: runs in base-repo context on workflow_run completion.
# Downloads Workflow A's artifact and posts PR comment / check-run.
# NEVER checks out or executes PR code. pull_request_target-with-checkout is forbidden.

name: Ledgerful PR Report

on:
  workflow_run:
    workflows: [Ledgerful PR Scan]
    types: [completed]

permissions:
  pull-requests: write
  checks: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Download the PR scan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ledgerful-pr-report
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Post risk summary
        # Same action pin as Workflow A (full commit SHA; no mutable tag yet).
        uses: Ryan-AI-Studios/ledgerful-action@2c8dacbc89dafae7d13735d1d19b89062de105a3
        with:
          github-token: ${{ github.token }}
          report-path: ledgerful-pr-report.json
