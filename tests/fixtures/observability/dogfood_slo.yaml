apiVersion: openslo/v1
kind: Service
metadata:
  name: dogfood-service
  displayName: Dogfood Service
  owner: dogfood-team
spec:
  description: "Dogfooding service for Ledgerful observability"
---
apiVersion: openslo/v1
kind: SLO
metadata:
  name: dogfood-slo
  displayName: Dogfood SLO
  owner: dogfood-team
spec:
  service: dogfood-service
  indicator:
    thresholdMetric:
      metricSource:
        metricSourceRef: prometheus
        type: prometheus
      metricQuery: sum(rate(dogfood_requests_total{status=~"2.."}[5m]))
  objectives:
    - target: 0.99
